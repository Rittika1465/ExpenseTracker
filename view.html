<!DOCTYPE html>
<html>
<head>
    <title>Transactions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h2>All Transactions</h2>
    <table>
        <tr>
            <th>Amount</th>
            <th>Category</th>
            <th>Type</th>
            <th>Date</th>
            <th>Notes</th>
            <th>Action</th>
        </tr>

        {% for t in transactions %}
        <tr>
            <td>{{ t.amount }}</td>
            <td>{{ t.category }}</td>
            <td>{{ t.type }}</td>
            <td>{{ t.date }}</td>
            <td>{{ t.notes }}</td>
            <td>
                <a href="/delete/{{ t.id }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <h3>Total Income: {{ income }}</h3>
    <h3>Total Expense: {{ expense }}</h3>

    <br>
    <a href="/form">Add New</a>
</div>
</body>
</html>
